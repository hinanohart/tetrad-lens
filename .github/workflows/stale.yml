name: stale

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9.1.0
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "co-maintainer,security,good first issue,help wanted,pinned"
          exempt-pr-labels: "security,wip"
          stale-issue-message: |
            This issue has been quiet for 60 days. It will be closed in 14 days if there is no further activity. Add a comment or remove the `stale` label to keep it open.
          stale-pr-message: |
            This PR has been quiet for 30 days. It will be closed in 14 days if there is no further activity. Push a commit or remove the `stale` label to keep it open.
          close-issue-message: |
            Closing as stale. Please reopen if this is still relevant.
          close-pr-message: |
            Closing as stale. Please reopen and rebase if you would like to continue this work.
