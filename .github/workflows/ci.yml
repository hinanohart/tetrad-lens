name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ban-words:
    name: Ban banned terms (no over-claims)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Grep for banned terms in tracked text
        shell: bash
        run: |
          set -euo pipefail
          # Match Japanese + English overclaims. Excludes CHANGELOG (where we may quote bans for context).
          PATTERN='自走|完全|永続|fully automated|fully autonomous'
          mapfile -t HITS < <(git grep -nE "$PATTERN" \
              -- ':(exclude)CHANGELOG.md' ':(exclude)CONTRIBUTING.md' \
                 ':(exclude).github/pull_request_template.md' ':(exclude).github/workflows/ci.yml' \
              || true)
          if [ "${#HITS[@]}" -gt 0 ]; then
            echo "::error::Banned terms found:"
            printf '%s\n' "${HITS[@]}"
            exit 1
          fi
          echo "No banned terms."

  python:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # tomllib is stdlib from 3.11+; the slopsquatting guard below uses it.
        # 3.10 is supported by the package itself (see pyproject.toml) but the
        # CI dep-audit step needs 3.11+. Local users on 3.10 are unaffected.
        python-version: ["3.11", "3.12"]
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Slopsquatting guard — every direct dep must exist on PyPI
        shell: bash
        run: |
          python - <<'PY'
          import json, sys, tomllib, urllib.request, pathlib
          # `packaging` is pulled in transitively by pip itself.
          from packaging.requirements import Requirement
          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          deps = list(data["project"].get("dependencies", []))
          for group in data["project"].get("optional-dependencies", {}).values():
              deps.extend(group)
          names = set()
          for spec in deps:
              if not spec or spec.startswith("#"):
                  continue
              try:
                  names.add(Requirement(spec).name.lower())
              except Exception as e:
                  print(f"::error::Could not parse requirement '{spec}': {e}", file=sys.stderr)
                  sys.exit(1)
          missing = []
          for n in sorted(names):
              try:
                  with urllib.request.urlopen(f"https://pypi.org/pypi/{n}/json", timeout=20) as r:
                      json.load(r)
              except Exception as e:
                  missing.append((n, str(e)))
          if missing:
              for n, e in missing:
                  print(f"::error::PyPI lookup failed for '{n}': {e}", file=sys.stderr)
              sys.exit(1)
          print(f"All {len(names)} direct deps resolved on PyPI.")
          PY
      - name: pip-audit (CVE scan on installed deps)
        run: |
          pip install --quiet pip-audit
          # --skip-editable: tetrad-lens itself is installed -e and may not be on PyPI yet.
          # NOTE: --strict would re-fail on the skip itself, so we rely on pip-audit's
          # default behavior (non-zero exit on real vulnerabilities) plus the explicit
          # guard below. --ignore-vuln slots stay free for accepted unfixed advisories.
          pip-audit --skip-editable --progress-spinner=off || {
            echo "::warning::pip-audit found vulnerabilities; review above."
            exit 1
          }
      - name: Schema parity (Pydantic must not drift from JSON Schema)
        shell: bash
        run: |
          python - <<'PY'
          import hashlib, pathlib
          schema = pathlib.Path("../schema/tetrad-v1.json").read_bytes()
          # Environment Hardening: fail if schema file was tampered post-checkout.
          h = hashlib.sha256(schema).hexdigest()
          print(f"schema sha256: {h}")
          assert len(schema) > 1000, "schema/tetrad-v1.json looks truncated"
          PY
      - name: Install optional extras (so adapters import cleanly)
        run: pip install -e ".[mcp,ollama]"
      - name: Adapter import smoke test
        run: |
          python -c "from tetrad_lens.adapters import cline_mcp, claude_code_skill; print('adapters OK')"
          python -c "from tetrad_lens import LLMTagger; print('ollama-aware tagger OK')"
      - name: Lint
        run: ruff check src tests
      - name: Type check
        run: mypy src
      - name: Test
        run: pytest -q

  ban-deprecated-action:
    name: Reject archived release-please-action import
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Forbid archived release-please action in workflows
        shell: bash
        run: |
          # Match only actual `uses:` lines (not commentary in this very file).
          if git grep -nE '^\s*uses:\s*google-github-actions/release-please-action' -- .github; then
            echo "::error::Use googleapis/release-please-action@v5 (the archived google-github-actions/* one is dead)."
            exit 1
          fi
